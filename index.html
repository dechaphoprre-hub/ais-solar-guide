<!DOCTYPE html> 
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AIS Solar Installation Guide</title>
<style>
  /* ─── TOKENS ─── */
  :root {
    --blue:       #4682B4;
    --blue-dark:  #2e5f8a;
    --blue-light: #6fa3cc;
    --blue-bg:    #eaf2fa;
    --accent:     #f4a820;
    --danger:     #e05252;
    --success:    #27ae60;
    --text:       #1a2a3a;
    --text-muted: #6b7f90;
    --border:     #ccdde8;
    --card-bg:    #ffffff;
    --page-bg:    #f0f6fb;
    --radius:     12px;
    --radius-sm:  8px;
    --shadow:     0 2px 12px rgba(70,130,180,0.13);
    --shadow-hover: 0 4px 20px rgba(70,130,180,0.22);
    --font:       'Sarabun', 'Helvetica Neue', Arial, sans-serif;
    --font-mono:  'Courier New', monospace;
    --transition: 0.2s ease;
    --header-h:   56px;
    --nav-h:      52px;
  }

  /* ─── RESET ─── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 15px; }
  body {
    font-family: var(--font);
    background: var(--page-bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }
  a { color: var(--blue); text-decoration: none; }
  button { font-family: var(--font); cursor: pointer; border: none; outline: none; }

  /* ─── HEADER ─── */
  .header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    height: var(--header-h);
    background: #1a3557;
    display: flex; align-items: center; gap: 10px;
    padding: 0 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.18);
  }
  .header-logo {
    width: 32px; height: 32px;
    background: white; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .header-logo svg { width: 20px; height: 20px; }
  .header-title { color: white; font-weight: 700; font-size: 1rem; letter-spacing: 0.02em; flex: 1; }
  .header-back {
    background: rgba(255,255,255,0.18);
    border: 1px solid rgba(255,255,255,0.3);
    color: white;
    width: 34px; height: 34px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem;
    flex-shrink: 0;
    display: none;
  }
  .header-back.visible { display: flex; }

  /* ─── STEP PROGRESS BAR ─── */
  .step-nav {
    position: fixed; top: var(--header-h); left: 0; right: 0; z-index: 99;
    height: var(--nav-h);
    background: white;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    gap: 0;
    padding: 0 8px;
  }
  .step-item {
    display: flex; align-items: center; gap: 0;
    flex: 1; max-width: 68px;
    flex-direction: column;
    position: relative;
  }
  .step-item:not(:last-child)::after {
    content: '';
    position: absolute; right: -50%; top: 14px;
    width: 100%; height: 2px;
    background: var(--border);
    z-index: 0;
    transition: background var(--transition);
  }
  .step-item.done:not(:last-child)::after { background: var(--blue); }
  .step-dot {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: white;
    color: var(--text-muted);
    font-size: 0.75rem; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    position: relative; z-index: 1;
    transition: all var(--transition);
  }
  .step-item.done .step-dot {
    background: var(--blue); border-color: var(--blue); color: white;
  }
  .step-item.active .step-dot {
    background: var(--accent); border-color: var(--accent); color: white;
    box-shadow: 0 0 0 4px rgba(244,168,32,0.2);
  }
  .step-label {
    font-size: 0.6rem; color: var(--text-muted); margin-top: 2px;
    text-align: center; line-height: 1.2;
    transition: color var(--transition);
    white-space: nowrap;
  }
  .step-item.active .step-label { color: var(--accent); font-weight: 700; }
  .step-item.done .step-label { color: var(--blue); }

  /* ─── MAIN CONTENT ─── */
  .main {
    margin-top: calc(var(--header-h) + var(--nav-h));
    padding: 16px 14px 80px;
    max-width: 480px;
    margin-left: auto; margin-right: auto;
  }

  /* ─── SCREEN ─── */
  .screen { display: none; }
  .screen.active { display: block; animation: fadeUp 0.25s ease; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ─── SECTION TITLE ─── */
  .section-title {
    font-size: 0.75rem; font-weight: 700;
    color: var(--blue); text-transform: uppercase;
    letter-spacing: 0.08em; margin-bottom: 4px;
  }
  .section-subtitle {
    font-size: 1rem; font-weight: 700; color: var(--text); margin-bottom: 14px;
  }
  .breadcrumb {
    font-size: 0.78rem; color: var(--text-muted);
    background: var(--blue-bg); border-radius: 20px;
    padding: 4px 12px; display: inline-flex; align-items: center; gap: 4px;
    margin-bottom: 12px; flex-wrap: wrap;
  }
  .breadcrumb span { color: var(--blue); font-weight: 600; }

  /* ─── GRID CHOICES ─── */
  .choice-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 16px;
  }
  .choice-btn {
    background: var(--card-bg);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 16px 8px 14px;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    transition: all var(--transition);
    min-height: 100px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }
  .choice-btn::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: var(--border);
    transition: background var(--transition);
  }
  .choice-btn:active { transform: scale(0.96); }
  .choice-btn:hover { border-color: var(--blue); }
  .choice-btn:hover::before { background: var(--blue); }
  .choice-btn.selected { border-color: var(--blue); background: var(--blue-bg); }
  .choice-btn.selected::before { background: var(--blue); }
  .choice-btn.selected-existing { border-color: #e8a800; background: #fffbf0; }
  .choice-btn.selected-existing::before { background: #e8a800; }
  .choice-btn.selected-rooftop { border-color: #7c5cbf; background: #f5f0ff; }
  .choice-btn.selected-rooftop::before { background: #7c5cbf; }

  .choice-code {
    font-size: 1.3rem; font-weight: 800; color: var(--blue); letter-spacing: 0.03em;
    line-height: 1;
  }
  .choice-label {
    font-size: 0.68rem; color: var(--text-muted); text-align: center; line-height: 1.4;
  }
  .choice-badge {
    font-size: 0.6rem; font-weight: 700;
    padding: 2px 7px; border-radius: 20px;
    background: var(--blue); color: white;
    letter-spacing: 0.03em;
  }
  .choice-badge.existing { background: #e8a800; color: #fff; }
  .choice-badge.new      { background: var(--success); color: #fff; }
  .choice-badge.rooftop  { background: #7c5cbf; color: #fff; }

  /* List style for position/structure/vendor */
  .choice-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
  .list-btn {
    background: var(--card-bg);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    display: flex; align-items: center; gap: 10px;
    cursor: pointer; transition: all var(--transition);
    text-align: left;
  }
  .list-btn:active { transform: scale(0.98); }
  .list-btn:hover { border-color: var(--blue); box-shadow: var(--shadow); }
  .list-btn.selected { border-color: var(--blue); background: var(--blue-bg); }
  .list-icon {
    width: 36px; height: 36px; border-radius: 10px;
    background: var(--blue-bg);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-size: 1.1rem;
  }
  .list-text { flex: 1; }
  .list-name { font-size: 0.92rem; font-weight: 600; color: var(--text); }
  .list-sub  { font-size: 0.72rem; color: var(--text-muted); margin-top: 1px; }
  .list-arrow { color: var(--border); font-size: 1rem; }

  /* ─── LOADING ─── */
  .loading {
    display: flex; flex-direction: column; align-items: center;
    padding: 40px 20px; gap: 14px;
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { color: var(--text-muted); font-size: 0.85rem; }

  /* ─── RESULT SCREEN ─── */
  .result-card {
    background: #1a3557;
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 14px;
    color: white;
  }
  .result-label { font-size: 0.72rem; opacity: 0.8; text-transform: uppercase; letter-spacing: 0.06em; }
  .result-codes { display: flex; flex-direction: column; gap: 10px; margin-top: 8px; }
  .code-chip {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 10px; padding: 10px 14px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .code-value {
    font-family: var(--font-mono);
    font-size: 1rem; font-weight: 700; letter-spacing: 0.03em;
  }
  .code-desc { font-size: 0.72rem; opacity: 0.8; margin-top: 2px; }
  .copy-btn {
    background: rgba(255,255,255,0.2);
    border: 1px solid rgba(255,255,255,0.3);
    color: white; font-size: 0.7rem; padding: 4px 8px; border-radius: 6px;
    cursor: pointer; flex-shrink: 0;
    transition: background var(--transition);
  }
  .copy-btn:active { background: rgba(255,255,255,0.4); }

  /* Guide card */
  .guide-card {
    background: var(--card-bg); border-radius: var(--radius);
    border: 1px solid var(--border); margin-bottom: 12px;
    overflow: hidden; box-shadow: var(--shadow);
  }
  .guide-header {
    background: var(--blue-bg); padding: 12px 14px;
    display: flex; align-items: center; gap: 8px; cursor: pointer;
  }
  .guide-header-icon { font-size: 1.1rem; }
  .guide-header-title { font-size: 0.9rem; font-weight: 700; color: var(--blue); flex: 1; }
  .guide-toggle { color: var(--blue); transition: transform var(--transition); }
  .guide-toggle.open { transform: rotate(180deg); }
  .guide-body { padding: 14px; display: none; }
  .guide-body.open { display: block; }

  .scope-list { list-style: none; padding: 0; }
  .scope-list li {
    padding: 6px 0 6px 24px; position: relative;
    font-size: 0.85rem; border-bottom: 1px solid var(--page-bg); color: var(--text);
  }
  .scope-list li:last-child { border-bottom: none; }
  .scope-list li::before {
    content: attr(data-n);
    position: absolute; left: 0; top: 6px;
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--blue); color: white;
    font-size: 0.65rem; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }

  .warning-box {
    background: #fff8e6; border: 1px solid #f4a820;
    border-radius: var(--radius-sm); padding: 10px 12px;
    margin-top: 10px;
  }
  .warning-box p { font-size: 0.82rem; color: #8a5500; line-height: 1.5; }

  .info-row {
    display: flex; align-items: baseline; gap: 6px;
    padding: 6px 0; border-bottom: 1px solid var(--page-bg);
    font-size: 0.83rem;
  }
  .info-row:last-child { border-bottom: none; }
  .info-key { color: var(--text-muted); min-width: 90px; font-size: 0.78rem; }
  .info-val { color: var(--text); font-weight: 600; flex: 1; }
  .info-val.highlight { color: var(--blue); font-family: var(--font-mono); }

  /* Standards table */
  .std-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  }
  .std-cell {
    background: var(--blue-bg); border-radius: var(--radius-sm);
    padding: 8px 10px;
  }
  .std-cell-key { font-size: 0.68rem; color: var(--text-muted); text-transform: uppercase; }
  .std-cell-val { font-size: 0.85rem; font-weight: 700; color: var(--blue); margin-top: 2px; font-family: var(--font-mono); }

  /* ─── QUICK LINKS ─── */
  .links-section { margin-top: 16px; }
  .links-grid { display: flex; flex-direction: column; gap: 8px; }
  .link-btn {
    display: flex; align-items: center; gap: 10px;
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 11px 14px;
    color: var(--text); text-decoration: none;
    font-size: 0.85rem; font-weight: 600;
    transition: all var(--transition);
  }
  .link-btn:active { background: var(--blue-bg); }
  .link-icon { font-size: 1.1rem; }
  .link-arrow { margin-left: auto; color: var(--text-muted); }

  /* ─── BOTTOM ACTION ─── */
  .action-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    padding: 10px 14px 14px;
    background: white; border-top: 1px solid var(--border);
    display: flex; gap: 10px;
    max-width: 480px; margin: 0 auto;
  }
  .btn-primary {
    flex: 1; background: var(--blue); color: white;
    border-radius: var(--radius); padding: 13px 20px;
    font-size: 0.95rem; font-weight: 700; letter-spacing: 0.02em;
    transition: background var(--transition);
    box-shadow: 0 3px 10px rgba(70,130,180,0.35);
  }
  .btn-primary:active { background: var(--blue-dark); }
  .btn-primary:disabled { background: var(--border); color: var(--text-muted); box-shadow: none; }
  .btn-secondary {
    background: var(--page-bg); color: var(--text);
    border: 1px solid var(--border);
    border-radius: var(--radius); padding: 13px 16px;
    font-size: 0.95rem; font-weight: 600;
    transition: all var(--transition);
  }
  .btn-secondary:active { background: var(--blue-bg); }

  /* ─── EMPTY STATE ─── */
  .empty-state {
    text-align: center; padding: 32px 20px; color: var(--text-muted);
  }
  .empty-icon { font-size: 2.5rem; margin-bottom: 10px; }
  .empty-text { font-size: 0.88rem; line-height: 1.6; }

  /* ─── TOAST ─── */
  .toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: #1a2a3a; color: white; border-radius: 20px;
    padding: 8px 18px; font-size: 0.82rem; font-weight: 600;
    opacity: 0; transition: all 0.3s ease; pointer-events: none; white-space: nowrap; z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ─── FONT IMPORT ─── */
  @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&display=swap');
</style>
</head>

<!-- HEADER -->
<header class="header">
  <button class="header-back" id="btnBack" onclick="goBack()">‹</button>
  <div class="header-logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="#4682B4" stroke-width="2.5">

    <div class="step-dot">1</div>
    <div class="step-label">Site Type</div>
  </div>
  <div class="step-item" id="nav2">

  <!-- SCREEN 2: POSITION -->

</main>

<!-- ACTION BAR -->
<div class="action-bar" id="actionBar" style="display:none">

</div>

<!-- TOAST -->

function renderStep1() {
  const grid = document.getElementById('siteTypeGrid');
  grid.innerHTML = '';

  const badgeClass = { 'Existing': 'existing', 'New': 'new', 'Rooftop': 'rooftop' };

  // Get unique site types from models or use default order
  const typeOrder = ['E1','E2','N1','N2','N3','N4','N5','R1','R2','R3'];
  const available = [...new Set(state.models.map(m => m.siteType))];
  const types = typeOrder.filter(t => available.includes(t));

  if (types.length === 0) {
    grid.innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-text">ไม่พบข้อมูล<br>กรุณาตรวจสอบ Google Sheet</div></div>';
    return;
  }

  types.forEach(code => {
    const info = state.siteTypeInfo.find(i => i.code === code) || { type: code.charAt(0) === 'E' ? 'Existing' : code.charAt(0) === 'R' ? 'Rooftop' : 'New', kw: '', desc: '' };
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = `
      <div class="choice-code">${code}</div>
      <div class="choice-badge ${badgeClass[info.type] || ''}">${info.type}</div>
      <div class="choice-label">${info.kw}</div>

    btn.onclick = () => selectSiteType(code, btn);
    grid.appendChild(btn);

  updateNavUI();

  const content = document.getElementById('resultContent');
  content.innerHTML = '<div class="loading"><div class="spinner"></div><div class="loading-text">กำลังโหลด...</div></div>';

  const results = MODELS.filter(m => m.siteType===state.siteType && m.position===state.position && m.structureType===state.structureType && m.vendor===state.vendor);
  const guide = getGuide(state.siteType, state.position);
  const standards = getStd();

  // Fetch BOQ from Google Sheets (published as CSV)
  const pfx = state.siteType ? state.siteType.charAt(0) : 'E';

  // ใช้ cache ถ้ามีแล้ว
  if (BOQ_CACHE[pfx]) {
    applyBOQ(results, guide, standards, BOQ_CACHE[pfx], pfx);
    return;
  }

  // ดึงจาก Apps Script API
  fetch(`${API_URL}?action=getBOQ&prefix=${pfx}`)
    .then(r => r.json())
    .then(json => {
      const boq = (json.status === 'ok') ? json.data : null;
      BOQ_CACHE[pfx] = boq;
      applyBOQ(results, guide, standards, boq, pfx);
    })
    .catch(() => {
      applyBOQ(results, guide, standards, null, pfx);
    });
}

function applyBOQ(results, guide, standards, boq, pfx) {
  let finalGuide = guide;
  if (pfx === 'E' && boq) {
    const allItems = results.flatMap(r => (boq[r.code] && boq[r.code].items) || []);
    const dynGuide = getDynamicGuide(results[0] ? results[0].siteType : 'E1', state.position, allItems);
    if (dynGuide) finalGuide = dynGuide;
  }
  renderResult({results, guide: finalGuide, standards, boq});
}

function parseBOQ(csv, codes) {
  // Parse CSV rows
  const rows = csv.split('\n').map(row => {
    const cols = [];
    let cur = ''; let inQ = false;
    for (let c of row) {
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else { cur += c; }
    }
    cols.push(cur.trim());
    return cols;
  });

  // Find rows matching our structure codes
  const result = {};
  codes.forEach(code => { result[code] = { items: [], drawingLink: '', scopeNote: '' }; });

  // สร้าง partial match map: "E1-G1L-C-Hatari 1" → "E1-G1L-C-Hatari"
  function findMatchingCode(cellVal) {
    if (!cellVal) return null;
    // exact match ก่อน
    if (codes.includes(cellVal)) return cellVal;
    // partial match: หา code ที่ cellVal ขึ้นต้นด้วย (เช่น "Hatari 1" startsWith "Hatari")
    const found = codes.find(code => cellVal.startsWith(code) || code.startsWith(cellVal));
    return found || null;
  }

  let currentCode = null;
  for (const row of rows) {
    const b = (row[1] || '').replace(/^"|"$/g,'').trim(); // Col B
    const c = (row[2] || '').replace(/^"|"$/g,'').trim(); // Col C material
    const d = (row[3] || '').replace(/^"|"$/g,'').trim(); // Col D unit
    const e = (row[4] || '').replace(/^"|"$/g,'').trim(); // Col E QTY
    const h = (row[7] || '').replace(/^"|"$/g,'').trim(); // Col H torque
    const i = (row[8] || '').replace(/^"|"$/g,'').trim(); // Col I scope
    const j = (row[9] || '').replace(/^"|"$/g,'').trim(); // Col J drawing link

    // Col B: ถ้ามีค่า = เจอ code หรือ section ใหม่, ถ้าว่าง = merged cell ใช้ currentCode ต่อ
    if (b) {
      const matched = findMatchingCode(b);
      if (matched) { currentCode = matched; }
      else { currentCode = null; }
    }
    // หยุดเมื่อเจอ row สรุปหรือ section divider
    if (c.startsWith('รวม') || c.startsWith('GRAND') || c.startsWith('──') || c.startsWith('—')) {
      currentCode = null;
    }
    if (currentCode && result[currentCode] && c) {
      const qty = parseFloat(e) || 0;
      // ป้องกัน item ซ้ำ — ถ้า mat เดิมมีแล้ว รวม qty
      const existing = result[currentCode].items.find(it => it.mat === c);
      if (existing) {
        existing.qty = Math.max(existing.qty, qty);
      } else {
        result[currentCode].items.push({ mat: c, unit: d, qty, torque: h });
      }
      if (i && !result[currentCode].scopeNote) result[currentCode].scopeNote = i;
      if (j && !result[currentCode].drawingLink) result[currentCode].drawingLink = j;
    }
  }
  return result;
}

    // Tools & Equipment
    if (guide.tools && guide.tools.length) {

          <ul class="scope-list">`;
      guide.tools.forEach((t, i) => { html += `<li data-n="${i+1}">${t}</li>`; });

    // Safety
    if (guide.safety && guide.safety.length) {
      html += `<div class="guide-card" style="border-color:#fca5a5">
        <div class="guide-header" style="background:#fff5f5" onclick="toggleSection('${safetyId}','${safetyId}t')">

  // --- Standards ---
  if (standards) {
    html += `<div class="guide-card">
      <div class="guide-header" onclick="toggleGuide('stdBody')">

        <div class="info-row"><span class="info-key">Anchor</span><span class="info-val highlight">${standards.anchor}</span></div>

        <div style="font-size:0.78rem;font-weight:700;color:var(--text-muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em">Torque Values</div>
        <div class="std-grid">
          <div class="std-cell"><div class="std-cell-key">M12</div><div class="std-cell-val">${standards.torques.M12}</div></div>
          <div class="std-cell"><div class="std-cell-key">M16</div><div class="std-cell-val">${standards.torques.M16}</div></div>
          <div class="std-cell"><div class="std-cell-key">Mid Clamp</div><div class="std-cell-val">${standards.torques.midClamp}</div></div>
          <div class="std-cell"><div class="std-cell-key">End Clamp</div><div class="std-cell-val">${standards.torques.endClamp}</div></div>
        </div>

          <div style="font-size:0.78rem;font-weight:700;color:var(--text-muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em">Cure Time</div>
          <div class="std-grid">
            <div class="std-cell"><div class="std-cell-key">20°C</div><div class="std-cell-val">${standards.cure.t20}</div></div>
            <div class="std-cell"><div class="std-cell-key">35°C</div><div class="std-cell-val">${standards.cure.t35}</div></div>
          </div>
        </div>
        </div>
      </div></div>`;
  }

  // --- BOQ ---
  if (boq) {
    results.forEach(r => {
      const b = boq[r.code];
      if (!b) return;
      const hasItems = b.items && b.items.some(i => i.qty > 0);
      if (!hasItems && !b.drawingLink) return;
      const boqId = 'boq_'+r.code.replace(/[^a-z0-9]/gi,'_');
      const drawId = 'draw_'+r.code.replace(/[^a-z0-9]/gi,'_');

      if (hasItems) {
        html += `<div class="guide-card">
          <div class="guide-header" onclick="toggleSection('${boqId}','${boqId}t')">

        b.items.filter(item => item.qty > 0).forEach(item => {
          html += `<div class="info-row">
            <span class="info-key" style="font-size:0.75rem;flex:1">${item.mat}</span>
            <span style="font-size:0.8rem;font-weight:700;color:var(--blue);white-space:nowrap;margin-left:8px">${item.qty} ${item.unit}</span>
          </div>`;
          if (item.torque) html += `<div style="font-size:0.7rem;color:#b45309;padding:0 0 4px 0">${item.torque}</div>`;

        html += `</div></div>`;
      }

      if (b.drawingLink) {
        html += `<div class="guide-card">

}

// ─── NAVIGATION ───────────────────────────────────────
function goToStep(step) {
  // Hide all screens
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen' + step).classList.add('active');
  state.step = step;

  // Render screen content
  if (step === 1) renderStep1();
  else if (step === 2) renderStep2();
  else if (step === 3) renderStep3();
  else if (step === 4) renderStep4();
  else if (step === 5) renderStep5();

  // Update nav + header
  updateNavUI();
  window.scrollTo({ top: 0, behavior: 'smooth' });

  // Action bar
  const bar = document.getElementById('actionBar');
  bar.style.display = (step > 1 && step < 5) ? 'flex' : 'none';

  // Back button in header
  const back = document.getElementById('btnBack');
  if (step > 1) { back.classList.add('visible'); } else { back.classList.remove('visible'); }
}

function goBack() {
  if (state.step > 1) goToStep(state.step - 1);
}

function goNext() {
  if (state.step < 5) goToStep(state.step + 1);
}

function resetAll() {
  state.siteType = null; state.position = null;
  state.structureType = null; state.vendor = null;
  goToStep(1);
}

// ─── UI HELPERS ───────────────────────────────────────
function updateNavUI() {
  for (let i = 1; i <= 5; i++) {
    const el = document.getElementById('nav' + i);
    el.classList.remove('active', 'done');
    if (i < state.step) el.classList.add('done');
    else if (i === state.step) el.classList.add('active');
  }

  // Header title
  const titles = ['', 'Site Type', 'Position', 'Structure', 'Vendor', 'Result'];
  document.getElementById('headerTitle').textContent = 'AIS Solar — ' + titles[state.step];
}

function selectItem(value, key, btn, selector) {
  document.querySelectorAll(selector + ' .list-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  state[key] = value;
}

function setBreadcrumb(id, items) {
  const el = document.getElementById(id);
  const labels = items.filter(Boolean);
  if (labels.length === 0) { el.style.display = 'none'; return; }
  el.style.display = 'inline-flex';
  el.innerHTML = labels.map((l, i) => i === labels.length - 1 ? `<span>${l}</span>` : `${l} ›`).join(' ');
}

function toggleGuide(bodyId) {
  const body = document.getElementById(bodyId);
  const toggleId = bodyId === 'guideBody' ? 'guideToggle' : 'stdToggle';
  const toggle = document.getElementById(toggleId);
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open');
  toggle.textContent = isOpen ? '▼' : '▲';
  toggle.classList.toggle('open');
}

function toggleSection(bodyId, toggleId) {
  const body = document.getElementById(bodyId);
  const toggle = document.getElementById(toggleId);
  if (!body || !toggle) return;
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open');
  toggle.textContent = isOpen ? '▼' : '▲';
  toggle.classList.toggle('open');
}

function copyCode(code) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(code).then(() => showToast('Copied: ' + code));
  } else {
    showToast(code);
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

  return {
