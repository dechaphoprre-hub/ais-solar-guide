var state = {cat: "", vendor: "", type: ""};

function nav(s) {
    for(var i=1; i<=4; i++) {
        document.getElementById('v'+i).classList.toggle('active', i === s);
        document.getElementById('s'+i).classList.toggle('active', i === s);
    }
}
function doSearch() {
    var val = document.getElementById('searchBar').value.toLowerCase();
    if(val.length < 1) { nav(1); return; }
    nav(4);
    var c4 = document.getElementById('c4'); c4.innerHTML = '<h3>ผลการค้นหา:</h3>';
    for(var i=0; i<db.length; i++) {
        if(db[i].mat.toLowerCase().indexOf(val) > -1 || db[i].code.toLowerCase().indexOf(val) > -1) {
            c4.innerHTML += '<div class="item '+(db[i].url=='#'?'pending':'')+'"><a href="'+db[i].url+'" target="_blank" style="color:white;text-decoration:none;">'+db[i].code+'<span class="badge-mat">Mat: '+db[i].mat+'</span></a></div>';
        }
    }
}
// Logic สำหรับระบบนำทาง 4 สเตป... (ตี๋ขอย่อเพื่อส่งให้ครบถ้วนในช่องนี้ครับ)
function renderCat() {
    var c1 = document.getElementById('c1'); c1.innerHTML = '';
    var cats = []; db.forEach(function(d){ if(cats.indexOf(d.cat)==-1) cats.push(d.cat); });
    cats.sort().forEach(function(c){ c1.innerHTML += '<div class="card" onclick="selectCat(\''+c+'\')"><div class="card-title">'+c+'</div></div>'; });
}
function selectCat(c) { state.cat = c; nav(2); renderVendor(); }
function renderVendor() {
    var c2 = document.getElementById('c2'); c2.innerHTML = '';
    var vendors = []; db.forEach(function(d){ if(d.cat == state.cat && vendors.indexOf(d.vendor)==-1) vendors.push(d.vendor); });
    vendors.sort().forEach(function(v){ c2.innerHTML += '<div class="item" onclick="selectVendor(\''+v+'\')">'+v+'</div>'; });
}
function selectVendor(v) { state.vendor = v; nav(3); renderType(); }
function renderType() {
    var c3 = document.getElementById('c3'); c3.innerHTML = '';
    var types = []; db.forEach(function(d){ if(d.cat == state.cat && d.vendor == state.vendor && types.indexOf(d.type)==-1) types.push(d.type); });
    types.sort().forEach(function(t){ c3.innerHTML += '<div class="item" onclick="selectType(\''+t+'\')">'+t+'</div>'; });
}
function selectType(t) { state.type = t; nav(4); renderItems(); }
function renderItems() {
    var c4 = document.getElementById('c4'); c4.innerHTML = '';
    db.forEach(function(d){ 
        if(d.cat == state.cat && d.vendor == state.vendor && d.type == state.type) {
            c4.innerHTML += '<div class="item '+(d.url=='#'?'pending':'')+'"><a href="'+d.url+'" target="_blank" style="color:white;text-decoration:none;">'+d.code+'<span class="badge-mat">Mat: '+d.mat+'</span></a></div>';
        }
    });
}
renderCat();
