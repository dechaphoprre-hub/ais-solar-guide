// ระบบคัดกรองสร้างเมนูผู้ผลิต (Vendor List Map) อัตโนมัติ ป้องกันข้อมูลตกหล่น
var vendorMap = {"E1": ["A-Plus", "Hatari", "Hatari/AAL", "Huawei 2020", "Interlink", "M.R.V", "Qualia", "Transpower", "เพชรตั้งใจ"], "E2": ["A-Plus", "Huawei 2020", "Interlink", "Qualia"], "N1": ["TCC"], "N2": ["TCC"], "N3": ["TCC"], "N4": ["TCC"], "R1": ["TCC"], "R2": ["TCC"], "R3": ["TCC"], "R2PV": ["TCC"], "R4PV": ["TCC"]};

var currentCategory = "";

function showView(viewId) {
    var views = document.querySelectorAll('.portal-view');
    for (var i = 0; i < views.length; i++) {
        views[i].classList.remove('active');
    }
    document.getElementById(viewId).classList.add('active');
    
    document.getElementById('ind-cat').classList.toggle('active', viewId === 'view-categories');
    document.getElementById('ind-vendor').classList.toggle('active', viewId === 'view-vendors');
    document.getElementById('ind-drawings').classList.toggle('active', viewId === 'view-drawings');
    
    window.scrollTo(0, 0);
}

function selectCategory(cat) {
    currentCategory = cat;
    var vendors = vendorMap[cat] || [];
    
    document.getElementById('vendor-title-label').innerText = 'หมวดหมู่ ' + cat + ' ➔ เลือก Vendor:';
    
    var container = document.getElementById('vendor-container');
    container.innerHTML = '';
    
    if (vendors.length === 0) {
        container.innerHTML = '<div style="text-align:center; padding:20px; color:#64748B;">ยังไม่มีข้อมูลผู้ผลิตในหมวดหมู่นี้</div>';
    } else {
        for (var i = 0; i < vendors.length; i++) {
            (function() {
                var v = vendors[i];
                var div = document.createElement('div');
                div.className = 'vendor-card';
                div.innerHTML = '<span>🏢 ' + v + '</span><span class="arrow">เลือก &rsaquo;</span>';
                div.onclick = function() { selectVendor(v); };
                container.appendChild(div);
            })();
        }
    }
    
    showView('view-vendors');
}

function selectVendor(vendor) {
    document.getElementById('drawing-title-label').innerText = 'หมวดหมู่ ' + currentCategory + ' ➔ ผู้ผลิต: ' + vendor;
    
    var container = document.getElementById('drawing-container');
    container.innerHTML = '';
    
    var filteredDrawings = [];
    for (var i = 0; i < drawingDatabase.length; i++) {
        var d = drawingDatabase[i];
        if (d.cat === currentCategory && d.vendor === vendor) {
            filteredDrawings.push(d);
        }
    }
    
    for (var j = 0; j < filteredDrawings.length; j++) {
        var drawing = filteredDrawings[j];
        var matHtml = drawing.mat ? '<span class="badge-mat">Mat Code: ' + drawing.mat + '</span>' : '';
        
        if (drawing.is_pending) {
            container.innerHTML += '<div class="drawing-card pending">' +
                '<div class="drawing-meta">' +
                    '<span class="badge-code">' + drawing.code + '</span>' +
                    '<span class="badge-info">ประเภทโครงสร้าง: ' + drawing.type + '</span>' +
                    matHtml +
                '</div>' +
                '<div class="view-action color-pending">กำลังปรับปรุง ⏳</div>' +
            '</div>';
        } else {
            container.innerHTML += '<a href="' + drawing.url + '" class="drawing-item-link" target="_blank">' +
                '<div class="drawing-card">' +
                    '<div class="drawing-meta">' +
                        '<span class="badge-code">' + drawing.code + '</span>' +
                        '<span class="badge-info">ประเภทโครงสร้าง: ' + drawing.type + '</span>' +
                        matHtml +
                    '</div>' +
                    '<div class="view-action">เปิดดูแบบ ↗</div>' +
                '</div>' +
            '</a>';
        }
    }
    
    showView('view-drawings');
}

function goBackToCategories() { showView('view-categories'); }
function goBackToVendors() { showView('view-vendors'); }
