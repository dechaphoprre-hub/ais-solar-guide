// สร้างโครงสร้างปุ่มกดแยกตาม Vendor อัตโนมัติ ป้องกันชื่อหลุด
const vendorMap = {};
drawingDatabase.forEach(function(item) {
    if (!vendorMap[item.cat]) { vendorMap[item.cat] = new Set(); }
    vendorMap[item.cat].add(item.vendor);
});
for (let cat in vendorMap) {
    vendorMap[cat] = Array.from(vendorMap[cat]).sort();
}

let currentCategory = "";

function showView(viewId) {
    document.querySelectorAll('.portal-view').forEach(function(v) { v.classList.remove('active'); });
    document.getElementById(viewId).classList.add('active');
    
    document.getElementById('ind-cat').classList.toggle('active', viewId === 'view-categories');
    document.getElementById('ind-vendor').classList.toggle('active', viewId === 'view-vendors');
    document.getElementById('ind-drawings').classList.toggle('active', viewId === 'view-drawings');
    
    window.scrollTo(0, 0);
}

function selectCategory(cat) {
    currentCategory = cat;
    const vendors = vendorMap[cat] || [];
    
    document.getElementById('vendor-title-label').innerText = 'หมวดหมู่ ' + cat + ' ➔ เลือก Vendor:';
    
    const container = document.getElementById('vendor-container');
    container.innerHTML = '';
    
    if (vendors.length === 0) {
        container.innerHTML = '<div style="text-align:center; padding:20px; color:#64748B;">ยังไม่มีข้อมูลผู้ผลิตในหมวดหมู่นี้</div>';
    } else {
        vendors.forEach(function(v) {
            const div = document.createElement('div');
            div.className = 'vendor-card';
            div.innerHTML = '<span>🏢 ' + v + '</span><span class="arrow">เลือก &rsaquo;</span>';
            div.onclick = function() { selectVendor(v); };
            container.appendChild(div);
        });
    }
    
    showView('view-vendors');
}

function selectVendor(vendor) {
    document.getElementById('drawing-title-label').innerText = 'หมวดหมู่ ' + currentCategory + ' ➔ ผู้ผลิต: ' + vendor;
    
    const container = document.getElementById('drawing-container');
    container.innerHTML = '';
    
    const filteredDrawings = drawingDatabase.filter(function(d) { return d.cat === currentCategory && d.vendor === vendor; });
    
    filteredDrawings.forEach(function(d) {
        if (d.is_pending) {
            container.innerHTML += '<div class="drawing-card pending"><div class="drawing-meta"><span class="badge-code">' + d.code + '</span><span class="badge-info">ประเภทโครงสร้าง: ' + d.type + '</span></div><div class="view-action color-pending">กำลังปรับปรุง ⏳</div></div>';
        } else {
            container.innerHTML += '<a href="' + d.url + '" class="drawing-item-link" target="_blank"><div class="drawing-card"><div class="drawing-meta"><span class="badge-code">' + d.code + '</span><span class="badge-info">ประเภทโครงสร้าง: ' + d.type + '</span></div><div class="view-action">เปิดดูแบบ ↗</div></div></a>';
        }
    });
    
    showView('view-drawings');
}

function goBackToCategories() { showView('view-categories'); }
function goBackToVendors() { showView('view-vendors'); }
</script>
