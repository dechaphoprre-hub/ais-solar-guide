<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hia Solar Portal v5.1</title>
    <style>
        body { background-color: #0F172A; color: #E2E8F0; font-family: sans-serif; margin: 0; padding: 12px; }
        .container { max-width: 600px; margin: 0 auto; }
        .header { text-align: center; color: #00E676; padding: 10px 0; border-bottom: 1px solid #334155; margin-bottom: 15px; }
        .search-box { width: 100%; padding: 12px; margin-bottom: 15px; background: #1E293B; border: 1px solid #475569; border-radius: 8px; color: white; box-sizing: border-box; }
        .steps { display: flex; justify-content: space-between; font-size: 10px; color: #64748B; background: #141E30; padding: 8px; border-radius: 6px; margin-bottom: 15px; }
        .step.active { color: #00E676; font-weight: bold; }
        .view { display: none; } .view.active { display: block; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .card { background: #1E293B; border: 1px solid #334155; border-radius: 8px; padding: 12px 2px; text-align: center; cursor: pointer; }
        .card:hover { border-color: #00E676; }
        .btn-back { background: #334155; color: white; border: none; padding: 8px 12px; border-radius: 6px; margin-bottom: 10px; cursor: pointer; }
        .item { background: #1E293B; border: 1px solid #334155; border-radius: 6px; padding: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .item.pending { opacity: 0.6; border: 1px dashed #475569; }
        .badge-mat { font-size: 10px; color: #A3E635; font-family: monospace; display: block; margin-top: 4px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header"><h1>SOLAR DRAWING PORTAL</h1></div>
    <input type="text" id="searchBar" class="search-box" placeholder="🔍 ค้นหา Code / Mat..." oninput="doSearch()">
    <div class="steps">
        <span id="s1" class="step active">1.หมวด</span> 
        <span id="s2" class="step">2.Vendor</span> 
        <span id="s3" class="step">3.Type</span> 
        <span id="s4" class="step">4.แบบ</span>
    </div>
    <div id="v1" class="view active"><div class="grid" id="c1">กำลังโหลดข้อมูล...</div></div>
    <div id="v2" class="view"><button class="btn-back" onclick="nav(1)">← ย้อนกลับ</button><div id="c2"></div></div>
    <div id="v3" class="view"><button class="btn-back" onclick="nav(2)">← ย้อนกลับ</button><div id="c3"></div></div>
    <div id="v4" class="view"><button class="btn-back" onclick="nav(3)">← ย้อนกลับ</button><div id="c4"></div></div>
</div>
<script>
var db = []; var state = {cat: "", vendor: "", type: ""};
fetch('https://docs.google.com/spreadsheets/d/e/2PACX-1vS_PrcPWYbIy_oId3OYloA6vhHlfHA5gwz23bHbLMAVvp_hC7bLCKeAAgvd7pMTfRTWTT71J6q0V9b9/pub?gid=653092401&single=true&output=csv')
    .then(function(res){ return res.text(); })
    .then(function(text){
        var lines = text.split(/\r?\n/);
        for(var i=1; i<lines.length; i++){
            var c = lines[i].split(',');
            if(c.length >= 6) db.push({cat: c[0].trim(), vendor: c[1].trim(), type: c[2].trim(), code: c[3].trim(), mat: c[4].trim(), url: c[5].trim()});
        }
        console.log("Load complete: " + db.length + " rows.");
        renderCat();
    });

function nav(s) {
    for(var i=1; i<=4; i++) {
        document.getElementById('v'+i).classList.toggle('active', i === s);
        document.getElementById('s'+i).classList.toggle('active', i === s);
    }
}
function renderCat() {
    var c1 = document.getElementById('c1'); c1.innerHTML = '';
    var cats = []; db.forEach(function(d){ if(cats.indexOf(d.cat)==-1 && d.cat) cats.push(d.cat); });
    cats.sort().forEach(function(c){ c1.innerHTML += '<div class="card" onclick="selectCat(\''+c+'\')"><div class="card-title">'+c+'</div></div>'; });
}
function selectCat(c) { state.cat = c; nav(2); renderVendor(); }
function renderVendor() {
    var c2 = document.getElementById('c2'); c2.innerHTML = '';
    var vens = []; db.forEach(function(d){ if(d.cat == state.cat && vens.indexOf(d.vendor)==-1) vens.push(d.vendor); });
    vens.sort().forEach(function(v){ c2.innerHTML += '<div class="item" onclick="selectVendor(\''+v+'\')">'+v+'</div>'; });
}
function selectVendor(v) { state.vendor = v; nav(3); renderType(); }
function renderType() {
    var c3 = document.getElementById('c3'); c3.innerHTML = '';
    var types = []; db.forEach(function(d){ if(d.cat == state.cat && d.vendor == state.vendor && types.indexOf(d.type)==-1) types.push(d.type); });
    types.sort().forEach(function(t){ c3.innerHTML += '<div class="item" onclick="selectType(\''+t+'\')">'+t+'</div>'; });
}
function selectType(t) { state.type = t; nav(4); renderItems(); }
function renderItems() {
    var c4 = document.getElementById('c4'); c4.innerHTML = '';
    db.forEach(function(d){ 
        if(d.cat == state.cat && d.vendor == state.vendor && d.type == state.type) {
            var url = (d.url == '0' || d.url == '' || d.url == '#') ? '#' : d.url;
            c4.innerHTML += '<div class="item '+(url=='#'?'pending':'')+'"><a href="'+url+'" target="_blank" style="color:white;text-decoration:none;">'+d.code+'<span class="badge-mat">Mat: '+d.mat+'</span></a></div>';
        }
    });
}
function doSearch() {
    var val = document.getElementById('searchBar').value.toLowerCase();
    if(val.length < 1) { nav(1); return; }
    nav(4);
    var c4 = document.getElementById('c4'); c4.innerHTML = '<h3>ผลการค้นหา:</h3>';
    db.forEach(function(d){
        if((d.mat && d.mat.toLowerCase().indexOf(val)>-1) || (d.code && d.code.toLowerCase().indexOf(val)>-1)) {
            c4.innerHTML += '<div class="item '+(d.url=='#'||d.url=='0'?'pending':'')+'"><a href="'+(d.url=='#'||d.url=='0'?'#':d.url)+'" target="_blank" style="color:white;text-decoration:none;">'+d.code+'<span class="badge-mat">Mat: '+d.mat+'</span></a></div>';
        }
    });
}
</script>
</body>
</html>
