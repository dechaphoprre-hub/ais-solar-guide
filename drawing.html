// Helper: สร้าง URL เต็มเพื่อเปิดไฟล์ใน Google Drive
function getDriveUrl(id) {
    return (id == '0' || id == '' || id == '#') ? '#' : 'https://drive.google.com/file/d/' + id + '/view?usp=sharing';
}

var state = {cat: "", vendor: "", type: ""};

// 🎯 ระบบสลับหน้าแบบเด็ดขาด 100%: สั่งปิดหน้าเก่าทับด้วยกลไก Inline Display + ดึงจอกลับขึ้นบนสุด
function nav(s) { 
    for(var i=1; i<=4; i++) { 
        var viewEl = document.getElementById('v'+i);
        var stepEl = document.getElementById('s'+i);
        
        if (i === s) {
            viewEl.style.display = 'block'; // ดีดหน้าปัจจุบันขึ้นมาทันที
            stepEl.classList.add('active'); 
        } else {
            viewEl.style.display = 'none';  // ล็อกปิดส่วนอื่นทิ้งสนิท
            stepEl.classList.remove('active');
        }
    } 
    window.scrollTo(0, 0); // รีเซ็ตหน้าจอเลื่อนกลับขึ้นบนสุด เพื่อไม่ให้ช่างงงสับสนครับ
}

function renderCat() { 
    var c1 = document.getElementById('c1'); c1.innerHTML = ''; 
    var cats = []; 
    db.forEach(function(d){ if(cats.indexOf(d.cat)==-1 && d.cat) cats.push(d.cat); }); 
    cats.sort().forEach(function(c){ c1.innerHTML += '<div class="card" onclick="selectCat(\''+c+'\')"><div class="card-title">'+c+'</div></div>'; }); 
}

function selectCat(c) { state.cat = c; nav(2); renderVendor(); }

function renderVendor() { 
    var c2 = document.getElementById('c2'); c2.innerHTML = ''; 
    var vens = []; 
    db.forEach(function(d){ if(d.cat == state.cat && vens.indexOf(d.vendor)==-1) vens.push(d.vendor); }); 
    vens.sort().forEach(function(v){ c2.innerHTML += '<div class="item" onclick="selectVendor(\''+v+'\')">'+v+'</div>'; }); 
}

function selectVendor(v) { state.vendor = v; nav(3); renderType(); }

function renderType() { 
    var c3 = document.getElementById('c3'); c3.innerHTML = ''; 
    var types = []; 
    db.forEach(function(d){ if(d.cat == state.cat && d.vendor == state.vendor && types.indexOf(d.type)==-1) types.push(d.type); }); 
    types.sort().forEach(function(t){ c3.innerHTML += '<div class="item" onclick="selectType(\''+t+'\')">'+t+'</div>'; }); 
}

function selectType(t) { state.type = t; nav(4); renderItems(); }

function renderItems() { 
    var c4 = document.getElementById('c4'); c4.innerHTML = ''; 
    db.forEach(function(d){ 
        if(d.cat == state.cat && d.vendor == state.vendor && d.type == state.type) { 
            var isPending = (d.url == '0' || d.url == '' || d.url == '#');
            var url = getDriveUrl(d.url);
            var actionText = isPending ? 'กำลังเตรียมแบบ' : 'เปิดดูแบบ ↗';
            var actionColor = isPending ? '#64748B' : '#00FF88';
            
            c4.innerHTML += '<div class="item '+(isPending?'pending':'')+'" onclick="if(\''+url+'\'!=\'#\') window.open(\''+url+'\', \'_blank\');">' +
                '<div style="flex:1;text-align:left;">' +
                    '<div class="item-code">'+d.code+'</div>' +
                    '<span class="badge-mat">Mat Code: '+d.mat+'</span>' +
                '</div>' +
                '<span style="font-size:12px;font-weight:bold;color:'+actionColor+';white-space:nowrap;">'+actionText+'</span>' +
                '</div>'; 
        } 
    }); 
}

function doSearch() { 
    var val = document.getElementById('searchBar').value.toLowerCase(); 
    if(val.length < 1) { nav(1); return; } 
    nav(4); 
    var c4 = document.getElementById('c4'); c4.innerHTML = '<h3>ผลการค้นหา:</h3>'; 
    db.forEach(function(d){ 
        if((d.mat && d.mat.toLowerCase().indexOf(val)>-1) || (d.code && d.code.toLowerCase().indexOf(val)>-1)) { 
            var isPending = (d.url == '0' || d.url == '' || d.url == '#');
            var url = getDriveUrl(d.url);
            var actionText = isPending ? 'กำลังเตรียมแบบ' : 'เปิดดูแบบ ↗';
            var actionColor = isPending ? '#64748B' : '#00FF88';
            
            c4.innerHTML += '<div class="item '+(isPending?'pending':'')+'" onclick="if(\''+url+'\'!=\'#\') window.open(\''+url+'\', \'_blank\');">' +
                '<div style="flex:1;text-align:left;">' +
                    '<div class="item-code">'+d.code+'</div>' +
                    '<span class="badge-mat">Mat Code: '+d.mat+'</span>' +
                '</div>' +
                '<span style="font-size:12px;font-weight:bold;color:'+actionColor+';white-space:nowrap;">'+actionText+'</span>' +
                '</div>'; 
        } 
    }); 
}
